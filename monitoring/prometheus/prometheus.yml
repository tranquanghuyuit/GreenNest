global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets:
          - jaeger:14269

  - job_name: greennest-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:4000
          - product-service:4001
          - auth-service:4002
          - user-service:4003
          - cart-service:4004
          - order-service:4005
          - payment-service:4006

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://frontend:8080
          - http://api-gateway:4000/health
          - http://api-gateway:4000/api/products?limit=1
          - http://product-service:4001/health
          - http://auth-service:4002/health
          - http://user-service:4003/health
          - http://cart-service:4004/health
          - http://order-service:4005/health
          - http://payment-service:4006/health
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
