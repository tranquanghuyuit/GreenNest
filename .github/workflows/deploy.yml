name: Deploy

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  REGISTRY: ${{ secrets.REGISTRY || 'docker.io' }}

jobs:
  build-images:
    name: Build and push ${{ matrix.service.name }}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api-gateway
            path: apps/api-gateway
          - name: auth-service
            path: apps/auth-service
          - name: user-service
            path: apps/user-service
          - name: product-service
            path: apps/product-service
          - name: cart-service
            path: apps/cart-service
          - name: order-service
            path: apps/order-service
          - name: payment-service
            path: apps/payment-service
          - name: frontend
            path: apps/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ matrix.service.name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          IMAGE_NAME="${REGISTRY}/${REPO_OWNER}/greennest-${SERVICE_NAME}"
          IMAGE_TAG="${GITHUB_SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "image=${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE_NAME}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image_latest }}
          cache-to: type=inline

  deploy-dev:
    name: Deploy to dev
    needs: build-images
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run services with Docker Compose
        working-directory: deploy/docker-compose
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d

      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:4000/health && \
               curl -f http://localhost:4002/health && \
               curl -f http://localhost:4001/health; then
              echo "✅ All services are healthy"
              exit 0
            fi
            echo "⏳ Waiting for services... ($i/30)"
            sleep 2
          done
          echo "❌ Services did not become healthy"
          exit 1

      - name: Smoke test
        run: |
          echo "Running smoke tests..."
          curl -f http://localhost:4000/health || exit 1
          curl -f http://localhost:5173/ || exit 1
          echo "✅ Smoke tests passed"

  deploy-staging:
    name: Deploy to staging
    needs: build-images
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kubescape
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | bash

      - name: Scan manifests with Kubescape
        continue-on-error: true
        run: |
          kubescape scan deploy/kubernetes/manifests --format sarif --output kubescape-results.sarif || true
          kubescape scan deploy/kubernetes/manifests --format table

      - name: Upload Kubescape results to GitHub
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: kubescape-results.sarif
          category: kubescape

      - name: Staging deployment note
        run: |
          echo "📋 Staging deployment steps:"
          echo "1. Set up kubeconfig: export KUBECONFIG=<staging-cluster-config>"
          echo "2. Run: kubectl apply -f deploy/kubernetes/manifests"
          echo "3. Verify: kubectl rollout status deployment -n staging"
          echo "4. Run: helm upgrade --install greennest deploy/helm-chart -n staging"
          echo "5. Run smoke tests and integration tests"
          echo ""
          echo "⚠️  Kubescape scan completed. Review results above."

  deploy-prod:
    name: Deploy to production
    needs: build-images
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Deploying version: ${VERSION}"

      - name: Production deployment note
        env:
          REGISTRY: ${{ env.REGISTRY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "🚀 Production deployment for ${VERSION}"
          echo ""
          echo "Pre-deployment checklist:"
          echo "✓ Images are built and pushed"
          echo "✓ Kubescape passed on main branch"
          echo "✓ Manual approval completed"
          echo ""
          echo "Deployment steps:"
          echo "1. Set up production kubeconfig"
          echo "2. kubectl set image deployment/api-gateway api-gateway=${REGISTRY}/greennest-api-gateway:${VERSION} -n prod"
          echo "3. kubectl set image deployment/auth-service auth-service=${REGISTRY}/greennest-auth-service:${VERSION} -n prod"
          echo "4. ... (repeat for all services)"
          echo "5. kubectl rollout status deployment -n prod"
          echo "6. Run smoke tests"
          echo ""
          echo "⚠️  Complete these steps manually or integrate with your deployment pipeline."
