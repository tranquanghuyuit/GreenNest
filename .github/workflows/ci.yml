name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: "22.12.0"
  OWASP_DEPENDENCY_CHECK_VERSION: "12.2.2"
  OWASP_DEPENDENCY_CHECK_CACHE_VERSION: "v3"

jobs:
  codeql-analysis:
    name: CodeQL analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep scan
        run: semgrep scan --config p/ci --error --metrics=off .

  trivy-repo-scan:
    name: Trivy repo scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare OWASP Dependency-Check cache key
        id: dependency-check-cache
        run: echo "week=$(date -u +'%G-%V')" >> "$GITHUB_OUTPUT"

      - name: Restore OWASP Dependency-Check data cache
        id: dependency-check-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: dependency-check-data
          key: dependency-check-data-${{ runner.os }}-${{ env.OWASP_DEPENDENCY_CHECK_CACHE_VERSION }}-${{ steps.dependency-check-cache.outputs.week }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-${{ env.OWASP_DEPENDENCY_CHECK_CACHE_VERSION }}-
            dependency-check-data-${{ runner.os }}-

      - name: Clean stale OWASP database locks
        run: |
          mkdir -p dependency-check-data
          find dependency-check-data -type f \( -name "*.lock.db" -o -name "*.trace.db" -o -name "*.lck" -o -name "*.lock" \) -print -delete

      - name: Update OWASP Dependency-Check data
        timeout-minutes: 10
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p dependency-check-data

          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY is missing. Skipping OWASP database update and using cached data if available."
            exit 0
          fi

          docker run --rm \
            -v "${{ github.workspace }}/dependency-check-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:${{ env.OWASP_DEPENDENCY_CHECK_VERSION }} \
            --updateonly \
            --data /usr/share/dependency-check/data \
            --nvdValidForHours 168 \
            --nvdApiKey "$NVD_API_KEY" \
            --nvdApiDelay 3500

      - name: Run OWASP Dependency-Check report from local data
        timeout-minutes: 15
        run: |
          mkdir -p dependency-check-report dependency-check-data

          if [ ! -f dependency-check-data/odc.mv.db ]; then
            cat > dependency-check-report/README.md <<'EOF'
          OWASP Dependency-Check was skipped because the local vulnerability database was not ready.

          The CI pipeline still runs Semgrep, CodeQL, Trivy repo scan, npm audit, Docker build, image scan, Compose validation, Kubernetes manifest validation, and smoke tests.

          To make this step faster and more reliable, add an NVD API key as the repository secret `NVD_API_KEY`.
          EOF
            echo "::warning::OWASP Dependency-Check database is missing, so the report step was skipped."
            exit 0
          fi

          if ! docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/dependency-check-report:/report" \
            -v "${{ github.workspace }}/dependency-check-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:${{ env.OWASP_DEPENDENCY_CHECK_VERSION }} \
            --project "GreenNest" \
            --scan /src/apps \
            --exclude "/src/apps/**/dist/**" \
            --exclude "/src/apps/**/node_modules/**" \
            --data /usr/share/dependency-check/data \
            --noupdate \
            --format HTML \
            --format JSON \
            --out /report \
            --failOnCVSS 11; then
            cat > dependency-check-report/README.md <<'EOF'
          OWASP Dependency-Check could not generate a report from the cached database in this run.

          This job is kept non-blocking because the NVD data source can be slow or locked on GitHub-hosted runners. Other security gates still run in CI.
          EOF
            echo "::warning::OWASP Dependency-Check scan failed, but CI will continue."
          fi

      - name: Check OWASP Dependency-Check cache status
        id: dependency-check-cache-status
        run: |
          if [ -f dependency-check-data/odc.mv.db ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save OWASP Dependency-Check data cache
        if: steps.dependency-check-cache-status.outputs.has_db == 'true' && steps.dependency-check-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dependency-check-data
          key: dependency-check-data-${{ runner.os }}-${{ env.OWASP_DEPENDENCY_CHECK_CACHE_VERSION }}-${{ steps.dependency-check-cache.outputs.week }}

      - name: Upload OWASP Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: dependency-check-report
          if-no-files-found: warn

  node-build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: frontend
            working-directory: apps/frontend
          - app: api-gateway
            working-directory: apps/api-gateway
          - app: auth-service
            working-directory: apps/auth-service
          - app: user-service
            working-directory: apps/user-service
          - app: product-service
            working-directory: apps/product-service
          - app: cart-service
            working-directory: apps/cart-service
          - app: order-service
            working-directory: apps/order-service
          - app: payment-service
            working-directory: apps/payment-service

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Build TypeScript app
        working-directory: ${{ matrix.working-directory }}
        run: npm run build

      - name: Run unit tests
        working-directory: ${{ matrix.working-directory }}
        run: npm test

      - name: Audit production dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm audit --audit-level=high --omit=dev

  docker-build:
    name: Docker build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs:
      - codeql-analysis
      - semgrep-sast
      - trivy-repo-scan
      - owasp-dependency-check
      - node-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: apps/frontend
          - image: api-gateway
            context: apps/api-gateway
          - image: auth-service
            context: apps/auth-service
          - image: user-service
            context: apps/user-service
          - image: product-service
            context: apps/product-service
          - image: cart-service
            context: apps/cart-service
          - image: order-service
            context: apps/order-service
          - image: payment-service
            context: apps/payment-service

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: devsecops-shop/${{ matrix.image }}:ci

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          scan-ref: devsecops-shop/${{ matrix.image }}:ci
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: table

  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f deploy/docker-compose/docker-compose.yml config

      - name: Validate monitoring compose overlay
        run: docker compose -f deploy/docker-compose/docker-compose.yml -f deploy/docker-compose/docker-compose.monitoring.yml config

      - name: Validate Kubernetes manifests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            registry.k8s.io/kustomize/kustomize:v5.7.1 \
            build deploy/kubernetes/manifests > /tmp/greennest-k8s.yaml

      - name: Validate Kubernetes monitoring manifests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            registry.k8s.io/kustomize/kustomize:v5.7.1 \
            build deploy/kubernetes/manifests-monitoring > /tmp/greennest-monitoring-k8s.yaml

  api-smoke-test:
    name: API smoke test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: docker compose -f deploy/docker-compose/docker-compose.yml up -d --build --wait --wait-timeout 180

      - name: Run smoke test
        run: bash scripts/ci/smoke-test.sh

      - name: Show container status
        if: always()
        run: docker compose -f deploy/docker-compose/docker-compose.yml ps

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f deploy/docker-compose/docker-compose.yml down -v
