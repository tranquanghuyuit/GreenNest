name: CD Docker Hub

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_PREFIX: greennest

jobs:
  preflight:
    name: Check Docker Hub configuration
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    outputs:
      enabled: ${{ steps.check.outputs.enabled || steps.stale.outputs.enabled }}

    steps:
      - name: Check latest main commit
        id: latest
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_MAIN_SHA="$(git ls-remote https://github.com/${{ github.repository }} refs/heads/main | awk '{print $1}')"
          echo "source_sha=$SOURCE_SHA"
          echo "latest_main_sha=$LATEST_MAIN_SHA"

          if [ "$SOURCE_SHA" != "$LATEST_MAIN_SHA" ]; then
            echo "::warning::CD skipped because this CI run is not the latest main commit."
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_latest=true" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub secrets
        id: check
        if: steps.latest.outputs.is_latest == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::warning::Docker Hub CD skipped. Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets to enable it."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Disable stale CD run
        id: stale
        if: steps.latest.outputs.is_latest != 'true'
        run: echo "enabled=false" >> "$GITHUB_OUTPUT"

  dockerhub-publish:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: preflight
    if: >
      needs.preflight.outputs.enabled == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: apps/frontend
          - image: api-gateway
            context: apps/api-gateway
          - image: auth-service
            context: apps/auth-service
          - image: user-service
            context: apps/user-service
          - image: product-service
            context: apps/product-service
          - image: cart-service
            context: apps/cart-service
          - image: order-service
            context: apps/order-service
          - image: payment-service
            context: apps/payment-service

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare image metadata
        id: meta
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SHORT_SHA="${SOURCE_SHA::12}"
          IMAGE_REPO="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_PREFIX}-${{ matrix.image }}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image_repo }}:latest

  update-kubernetes-manifests:
    name: Update Kubernetes image tags
    runs-on: ubuntu-latest
    needs:
      - preflight
      - dockerhub-publish
    if: >
      needs.preflight.outputs.enabled == 'true'

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image references
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SHORT_SHA="${SOURCE_SHA::12}"
          update_image() {
            local service="$1"
            local file="$2"
            local image="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_PREFIX}-${service}:${SHORT_SHA}"
            sed -i -E "s#image: .*${service}:.*#image: ${image}#g" "$file"
            sed -i -E "s#imagePullPolicy: IfNotPresent#imagePullPolicy: Always#g" "$file"
          }

          update_image "frontend" "deploy/kubernetes/manifests/frontend.yaml"
          update_image "api-gateway" "deploy/kubernetes/manifests/api-gateway.yaml"
          update_image "auth-service" "deploy/kubernetes/manifests/auth-service.yaml"
          update_image "user-service" "deploy/kubernetes/manifests/user-service.yaml"
          update_image "product-service" "deploy/kubernetes/manifests/product-service.yaml"
          update_image "cart-service" "deploy/kubernetes/manifests/cart-service.yaml"
          update_image "order-service" "deploy/kubernetes/manifests/order-service.yaml"
          update_image "payment-service" "deploy/kubernetes/manifests/payment-service.yaml"

      - name: Validate Kubernetes manifests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            registry.k8s.io/kustomize/kustomize:v5.7.1 \
            build deploy/kubernetes/manifests > /tmp/greennest-k8s.yaml

      - name: Commit image tag updates
        run: |
          if git diff --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kubernetes/manifests
          git commit -m "chore(cd): update Docker Hub image tags [skip ci]"
          git push origin main
