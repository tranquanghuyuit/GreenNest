apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: greennest-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tranquanghuyuit/GreenNest.git
    targetRevision: main
    path: deploy/kubernetes/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: greennest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
