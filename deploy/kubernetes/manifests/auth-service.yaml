apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          image: docker.io/huydeptraivl2005/greennest-auth-service:606c80598e1d
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: NODE_ENV
            - name: PORT
              value: "4002"
            - name: OTEL_TRACING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: OTEL_TRACING_ENABLED
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: DATABASE_URL
              value: postgresql://auth_user:auth_password@auth-db:5432/auth_db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: greennest-dev-secrets
                  key: JWT_SECRET
            - name: ACCESS_TOKEN_EXPIRES_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: AUTH_ACCESS_TTL_SECONDS
            - name: REFRESH_TOKEN_EXPIRES_DAYS
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: AUTH_REFRESH_TTL_DAYS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: greennest-dev-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: greennest-dev-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: GOOGLE_REDIRECT_URI
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 4002
      targetPort: 4002
