apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  labels:
    app.kubernetes.io/name: cart-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cart-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cart-service
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cart-service
          image: docker.io/huydeptraivl2005/greennest-cart-service:7c3b92f0e0f5
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 4004
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: NODE_ENV
            - name: PORT
              value: "4004"
            - name: OTEL_TRACING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: OTEL_TRACING_ENABLED
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: DATABASE_URL
              value: postgresql://cart_user:cart_password@cart-db:5432/cart_db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: greennest-dev-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  labels:
    app.kubernetes.io/name: cart-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cart-service
  ports:
    - name: http
      port: 4004
      targetPort: 4004
