apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  labels:
    app.kubernetes.io/name: cart-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cart-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cart-service
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: cart-service
          image: devsecops-shop/cart-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4004
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: greennest-app-config
                  key: NODE_ENV
            - name: PORT
              value: "4004"
            - name: DATABASE_URL
              value: postgresql://cart_user:cart_password@cart-db:5432/cart_db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: greennest-dev-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  labels:
    app.kubernetes.io/name: cart-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cart-service
  ports:
    - name: http
      port: 4004
      targetPort: 4004
