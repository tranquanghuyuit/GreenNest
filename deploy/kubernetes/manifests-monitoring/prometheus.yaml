apiVersion: v1
kind: ConfigMap
metadata:
  name: greennest-prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - prometheus:9090

      - job_name: alertmanager
        static_configs:
          - targets:
              - alertmanager:9093

      - job_name: grafana
        static_configs:
          - targets:
              - grafana:3000

      - job_name: jaeger
        metrics_path: /metrics
        static_configs:
          - targets:
              - jaeger:14269

      - job_name: greennest-http-probes
        metrics_path: /probe
        params:
          module:
            - http_2xx
        static_configs:
          - targets:
              - http://frontend:8080
              - http://api-gateway:4000/health
              - http://api-gateway:4000/api/products?limit=1
              - http://product-service:4001/health
              - http://auth-service:4002/health
              - http://user-service:4003/health
              - http://cart-service:4004/health
              - http://order-service:4005/health
              - http://payment-service:4006/health
        relabel_configs:
          - source_labels:
              - __address__
            target_label: __param_target
          - source_labels:
              - __param_target
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

  alerts.yml: |
    groups:
      - name: greennest-availability
        rules:
          - alert: GreenNestEndpointDown
            expr: probe_success{job="greennest-http-probes"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "GreenNest endpoint is down"
              description: "{{ $labels.instance }} has failed blackbox probing for more than 1 minute."

          - alert: GreenNestSlowEndpoint
            expr: probe_duration_seconds{job="greennest-http-probes"} > 2
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "GreenNest endpoint is slow"
              description: "{{ $labels.instance }} is responding slower than 2 seconds."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-config
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: prometheus-config
          configMap:
            name: greennest-prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
